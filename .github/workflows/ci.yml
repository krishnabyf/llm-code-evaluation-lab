name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Install Python tools
        run: pip install -r requirements-dev.txt
      - name: Python checks
        run: |
          pytest python_tasks/rate_limiter/tests
          ruff check python_tasks
      - name: JavaScript checks
        run: node --test javascript_react_tasks/use_effect_fetch/tests/*.test.js
      - name: C++ checks
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror cpp_tasks/two_sum/fixed_solution.cpp -o /tmp/two_sum_test
          /tmp/two_sum_test
      - name: Go checks
        run: cd go_tasks/retry_client && go test ./...
      - name: Java checks
        run: |
          javac java_tasks/lru_cache/fixed_solution.java
          java -ea -cp java_tasks/lru_cache LruCacheTest
      - name: Rust checks
        run: |
          rustc --test rust_tasks/result_parser/fixed_solution.rs -o /tmp/result_parser_test
          /tmp/result_parser_test
